version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: neurolearn_client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SERVER_URL: http://server:5000
      NEXT_PUBLIC_CLIENT_URL: http://localhost:3000
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: neurolearn_server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-neurolearn}:${DB_PASSWORD:-neurolearn123}@postgres:5432/${DB_NAME:-neurolearn}
      NEXT_PUBLIC_SERVER_URL: http://server:5000
      NEXT_PUBLIC_CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: neurolearn_db
    environment:
      POSTGRES_USER: ${DB_USER:-neurolearn}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-neurolearn123}
      POSTGRES_DB: ${DB_NAME:-neurolearn}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neurolearn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neurolearn_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: neurolearn_network
